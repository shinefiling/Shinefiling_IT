spring.application.name=it-freelancer-backend

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/Shinefiling_IT_DB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
spring.datasource.username=shinefiling
spring.datasource.password=Shinefiling@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8081

# Email Configuration (Current: Local SMTP - Connection Refused if not running)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.default-encoding=UTF-8
mail.from.address=info@shinefiling.com
mail.admin.address=info@shinefiling.com

# --- Gmail SMTP Configuration (Uncomment and update to use real emails) ---
