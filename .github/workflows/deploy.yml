name: Deploy IT Freelancer Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/Shinefiling_IT/backend/target
            
            # Navigate to project
            cd ~/Shinefiling_IT
            
            # Pull latest changes (optional if using scp, but good for tracking)
            git pull origin main
            
            # Note: In a real CI/CD, we would use scp to transfer build artifacts.
            # But since your server environment already has everything set up,
            # we will trigger the build and deploy script on the server for simplicity.
            
            # Update Frontend
            cd frontend
            npm install
            npm run build
            sudo cp -r dist/* /var/www/it-freelancers/
            
            # Update Backend
            cd ../backend
            mvn clean package -DskipTests
            
            # Fix for Port 8081 already in use
            sudo fuser -k 8081/tcp || true
            
            # Restart Service
            sudo systemctl restart shinefiling-it-backend
