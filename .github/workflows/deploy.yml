name: Deploy IT Freelancer Platform

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # 1. Build Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    # 2. Build Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    # 3. Deploy to Server
    - name: Deploy Artifacts to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "backend/target/*.jar,frontend/dist/*"
        target: "~/deploy_temp"
        strip_components: 0

    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # Create directories if they don't exist
          mkdir -p ~/Shinefiling_IT/backend/target
          
          # Move JAR to the correct location
          cp ~/deploy_temp/backend/target/*.jar ~/Shinefiling_IT/backend/target/
          
          # Move Frontend files to web directory
          sudo rm -rf /var/www/it-freelancers/*
          sudo cp -r ~/deploy_temp/frontend/dist/* /var/www/it-freelancers/
          
          # Restart Backend Service
          sudo systemctl restart shinefiling-it-backend
          
          # Restart Apache
          sudo systemctl restart apache2
          
          # Clean up temp folder
          rm -rf ~/deploy_temp
