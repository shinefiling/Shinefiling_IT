name: Deploy IT Freelancer Platform

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # 1. Build Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    # 2. Build Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    # 3. Deploy to Server
    - name: Copy JAR to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "backend/target/*.jar"
        target: "/home/${{ secrets.SERVER_USER }}/Shinefiling_IT/"
        strip_components: 0

    - name: Copy Frontend to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "frontend/dist/*"
        target: "/home/${{ secrets.SERVER_USER }}/Shinefiling_IT_transfer/"
        strip_components: 2

    - name: Execute Deployment Script
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          PROJECT_ROOT="/home/${{ secrets.SERVER_USER }}/Shinefiling_IT"
          TRANSFER_DIR="/home/${{ secrets.SERVER_USER }}/Shinefiling_IT_transfer"
          WEB_ROOT="/var/www/it-freelancers"
          
          echo "Starting deployment..."
          
          # 1. Update Frontend
          echo "Updating frontend files..."
          sudo rm -rf $WEB_ROOT/*
          sudo cp -r $TRANSFER_DIR/* $WEB_ROOT/
          
          # 2. Update Backend
          echo "Managing backend service..."
          # Kill any manual process on 8081 if exists
          sudo fuser -k 8081/tcp || true
          
          sudo systemctl daemon-reload
          sudo systemctl restart shinefiling-it-backend
          sudo systemctl enable shinefiling-it-backend
          
          # 3. Finalize
          sudo systemctl restart apache2
          
          # Cleanup transfer folder
          rm -rf $TRANSFER_DIR/*
          
          echo "Deployment successful!"
