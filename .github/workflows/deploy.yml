name: Deploy IT Freelancer Platform

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # 1. Build Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      run: |
        cd backend
        mvn clean package -DskipTests

    # 2. Build Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    # 3. Deploy to Server
    - name: Deploy to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # Go to project directory
          cd ~/Shinefiling_IT
          
          # Pull latest code (to sync any non-build files)
          git pull origin main
          
          # Rebuild Backend on server (Safer for database dependencies and specific environment)
          # Alternatively, we could scp the jar, but building on server is easier for now
          cd backend
          mvn clean package -DskipTests
          sudo systemctl restart shinefiling-it-backend
          
          # Build Frontend on server
          cd ../frontend
          npm install
          npm run build
          sudo cp -r dist/* /var/www/it-freelancers/
          
          # Restart Apache
          sudo systemctl restart apache2
