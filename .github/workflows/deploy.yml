name: Shinefiling IT Full Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Node.js for frontend
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    # 3️⃣ Setup Java 17 for backend
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4️⃣ Build backend (Maven)
    - name: Build Backend
      run: |
        cd backend
        mvn clean package -DskipTests

    # 5️⃣ Build frontend (npm)
    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    # 6️⃣ Transfer Files (JAR and Frontend dist)
    - name: Copy JAR to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "backend/target/it-freelancer-backend-0.0.1-SNAPSHOT.jar"
        target: "/home/prakash/Shinefiling_IT/"
        strip_components: 0

    - name: Copy Frontend to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "frontend/dist/*"
        target: "/home/prakash/Shinefiling_IT_transfer/"
        strip_components: 2

    # 7️⃣ Deploy via SSH
    - name: Deploy to Server
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # 1. Update Frontend
          sudo mkdir -p /var/www/it-freelancers
          sudo rm -rf /var/www/it-freelancers/*
          sudo cp -r /home/prakash/Shinefiling_IT_transfer/* /var/www/it-freelancers/
          sudo chown -R www-data:www-data /var/www/it-freelancers
          sudo chmod -R 755 /var/www/it-freelancers
          
          # Cleanup transfer folder
          rm -rf /home/prakash/Shinefiling_IT_transfer/*
          
          # 2. Manage Backend
          # Move JAR to final location
          mv /home/prakash/Shinefiling_IT/backend/target/it-freelancer-backend-0.0.1-SNAPSHOT.jar /home/prakash/Shinefiling_IT/backend/
          
          # Restart the systemd service
          sudo systemctl restart shinefiling-it-backend
          
          # 3. Reload Apache
          sudo systemctl reload apache2
          
          echo "Deployment successful for IT Freelancer Platform!"
